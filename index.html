<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Route Optimizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBK-WMZn-5evKvOtH93VvlHkTfhGZZeDo0&libraries=places"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        #selectedLocations li { touch-action: pan-y; user-select: none; }
        
        /* Dropdown styling */
        .pac-container {
            z-index: 10000 !important;
            border-radius: 12px;
            margin-top: 5px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: none;
        }
        .pac-item { padding: 10px; cursor: pointer; }

        /* Sürükleme Stilleri */
        .drag-handle { cursor: grab; }
        .drag-handle:active { cursor: grabbing; }
        .dragging {
            opacity: 0.5;
            background-color: #eff6ff !important;
            border: 2px solid #3b82f6 !important;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
        <div class="bg-slate-900 px-6 py-8 text-center">
            <h1 class="text-2xl font-bold text-white tracking-tight">Route Optimizer</h1>
        </div>

        <div class="p-6">
            <div class="mb-4">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Add Location</label>
                <div class="flex gap-2">
                    <input id="autocomplete" type="text" 
                           class="flex-1 border border-gray-300 rounded-xl p-3.5 focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50 text-sm" 
                           placeholder="Search restaurant or address...">
                </div>
            </div>

            <ul id="selectedLocations" class="mb-4 space-y-2"></ul>

            <button id="harvestBtn" type="button" onclick="loadMiniatureHarvest()"
                    class="w-full mb-6 bg-emerald-50 text-emerald-700 border border-emerald-200 font-bold py-3 rounded-xl hover:bg-emerald-100 transition flex justify-center items-center gap-2 text-xs uppercase tracking-widest">
                <span id="harvestText">🌱 Miniature Harvest</span>
            </button>

            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Departure Times (Optional)</label>
                <input type="text" id="times" class="w-full border border-gray-300 rounded-xl p-3.5 outline-none bg-gray-50 text-sm" placeholder="e.g., 08:00 14:00">
            </div>

            <button id="calcBtn" onclick="processRoute()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl hover:bg-blue-700 transition shadow-lg flex justify-center items-center gap-2">
                <span id="btnText">Optimize Strategy</span>
                <svg id="loadingIcon" class="hidden animate-spin h-5 w-5 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            </button>
        </div>

        <div id="resultsArea" class="hidden bg-gray-50 p-6 border-t border-gray-200">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-slate-800">Optimal Route</h2>
                <span id="durationBadge" class="bg-blue-600 text-white text-xs font-bold px-3 py-1 rounded-full"></span>
            </div>
            
            <p class="text-[10px] text-gray-400 mb-3 italic">Tip: Drag the ≡ icon to reorder route manually.</p>
            
            <ul id="finalRouteList" class="space-y-2 mb-6"></ul>
            
            <div id="aiBox" class="p-4 bg-white border border-blue-100 rounded-2xl shadow-sm mb-6 hidden">
                <p id="aiText" class="text-xs text-slate-600 leading-relaxed"></p>
            </div>
            <a id="mapsLink" href="#" target="_blank" class="w-full bg-slate-800 text-white font-bold py-4 rounded-2xl flex justify-center items-center gap-2">GO TO MAPS</a>
        </div>
    </div>

    <script>
        let selectedLocations = [];
        let autocomplete;

        // Initialize Google Autocomplete
        function initAutocomplete() {
            autocomplete = new google.maps.places.Autocomplete(
                document.getElementById('autocomplete'),
                { 
                    types: ['establishment', 'geocode'], 
                    componentRestrictions: { country: 'us' },
                    fields: ['name', 'place_id', 'formatted_address']
                }
            );

            autocomplete.addListener('place_changed', () => {
                const place = autocomplete.getPlace();
                if (!place.place_id) return;
                addLocationData(place);
                document.getElementById('autocomplete').value = '';
            });
        }

        // Add verified location to array
        function addLocationData(place) {
            if (!selectedLocations.some(l => l.place_id === place.place_id)) {
                selectedLocations.push({
                    address: place.formatted_address,
                    place_id: place.place_id,
                    name: place.name
                });
                renderSelectedList();
            }
        }

        // Update UI list
        function renderSelectedList() {
            const list = document.getElementById('selectedLocations');
            list.innerHTML = selectedLocations.map((loc, i) => `
                <li class="bg-white border border-gray-200 p-3 rounded-xl flex justify-between items-center shadow-sm">
                    <span class="text-sm font-medium text-gray-700 truncate mr-2">${loc.name || loc.address}</span>
                    <button onclick="removeLocation(${i})" class="text-red-400 hover:text-red-600 p-1">✕</button>
                </li>
            `).join('');
        }

        function removeLocation(index) {
            selectedLocations.splice(index, 1);
            renderSelectedList();
        }

        // Auto-load preset addresses
        async function loadMiniatureHarvest() {
            const harvestBtn = document.getElementById('harvestBtn');
            const harvestText = document.getElementById('harvestText');
            
            const addresses = [
                "Sleep Inn Dallas Northwest – Irving", "Pearl Sushi, TX", "Le Margot, TX",
                "Shady Oaks Country Club, TX", "Wishbone & Flynt, TX", "Stone House Restaurant, TX",
                "Sear Steakhouse & Lounge, TX", "Seven Doors Kitchen & Cocktails, TX",
                "Texican Court, Valencia Hotel Collection, TX"
            ];

            harvestText.innerText = "⌛ Loading Addresses...";
            harvestBtn.disabled = true;

            const service = new google.maps.places.PlacesService(document.createElement('div'));

            for (const addr of addresses) {
                const request = { query: addr, fields: ['name', 'formatted_address', 'place_id'] };
                
                await new Promise(resolve => {
                    service.findPlaceFromQuery(request, (results, status) => {
                        if (status === google.maps.places.PlacesServiceStatus.OK && results[0]) {
                            addLocationData(results[0]);
                        }
                        setTimeout(resolve, 200); // Prevent rate limiting
                    });
                });
            }

            harvestText.innerText = "🌱 Miniature Harvest";
            harvestBtn.disabled = false;
        }

        // Submit data to backend
        async function processRoute() {
            if (selectedLocations.length < 2) return alert("Please add at least 2 stops.");
            
            const btnText = document.getElementById('btnText');
            const loadingIcon = document.getElementById('loadingIcon');

            btnText.innerText = "Calculating...";
            loadingIcon.classList.remove('hidden');

            try {
                // Not: Render URL'nizi buraya yazmayı unutmayın
                const response = await fetch('/optimize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        locations: selectedLocations.map(l => l.address),
                        times: document.getElementById('times').value.split(/[ ,]+/).filter(t => t)
                    })
                });

                const data = await response.json();
                if (response.ok) {
                    renderFinalResults(data);
                } else {
                    alert("Error: " + data.detail);
                }
            } catch (e) {
                alert("Server connection failed.");
            } finally {
                btnText.innerText = "Optimize Strategy";
                loadingIcon.classList.add('hidden');
            }
        }

        // Display results from API
        function renderFinalResults(data) {
            document.getElementById('resultsArea').classList.remove('hidden');
            document.getElementById('durationBadge').innerText = `${data.estimated_duration_mins} mins`;
            
            const list = document.getElementById('finalRouteList');
            list.innerHTML = data.suggested_route.map(addr => `
                <li class="bg-white p-3 rounded-xl border-l-4 border-blue-500 shadow-sm flex items-center gap-3">
                    <div class="drag-handle text-gray-300">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 16h16"></path>
                        </svg>
                    </div>
                    <span class="final-addr-text text-sm text-slate-700 leading-tight">${addr}</span>
                </li>
            `).join('');

            if (data.ai_insights) {
                document.getElementById('aiBox').classList.remove('hidden');
                document.getElementById('aiText').innerText = data.ai_insights;
            }

            // Init Sortable
            new Sortable(list, {
                animation: 150,
                handle: '.drag-handle',
                ghostClass: 'dragging',
                delay: 100,
                delayOnTouchOnly: true,
                onEnd: updateDynamicMapsLink
            });

            updateDynamicMapsLink();
        }

        // Sürükleme sonrası linki günceller
        function updateDynamicMapsLink() {
            const addrElements = document.querySelectorAll('.final-addr-text');
            const addresses = Array.from(addrElements).map(el => el.innerText);
            
            if (addresses.length < 2) return;

            const origin = encodeURIComponent(addresses[0]);
            const dest = encodeURIComponent(addresses[addresses.length - 1]);
            let url = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${dest}&travelmode=driving`;
            
            if (addresses.length > 2) {
                const waypoints = encodeURIComponent(addresses.slice(1, -1).join('|'));
                url += `&waypoints=${waypoints}`;
            }
            document.getElementById('mapsLink').href = url;
        }

        window.onload = initAutocomplete;
    </script>
</body>
</html>
