<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Optimizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .dragging { opacity: 0.4; background-color: #e5e7eb; border: 2px dashed #9ca3af; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-lg rounded-2xl shadow-xl overflow-hidden border border-gray-100">

        <div class="bg-slate-900 px-6 py-5">
            <h1 class="text-xl font-bold text-white flex items-center gap-2">
                <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path>
                </svg>
                Route Optimizer
            </h1>
        </div>

        <div class="p-6">
            <div class="mb-5">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Locations (One per line)</label>
                <textarea id="locations" rows="5"
                          class="w-full border border-gray-300 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition bg-gray-50 resize-none"
                          placeholder="The University of Texas at Dallas, Richardson, TX
Buc-ee's, Temple, TX
The University of Texas at Austin, TX"></textarea>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Departure Times (Optional)</label>
                <input type="text" id="times"
                       class="w-full border border-gray-300 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition bg-gray-50"
                       placeholder="e.g., 07:45 14:30 (Leave blank for NOW)">
            </div>

            <button id="calcBtn" onclick="processRoute()"
                    class="w-full bg-blue-600 text-white font-semibold py-3.5 rounded-xl hover:bg-blue-700 transition shadow-md flex justify-center items-center gap-2">
                <span id="btnText">Optimize Route</span>
                <svg id="loadingIcon" class="hidden animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg"
                     fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor"
                          d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </div>

        <div id="resultsArea" class="hidden bg-gray-50 p-6 border-t border-gray-200">
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-lg font-bold text-slate-800">Suggested Route</h2>
                <span id="durationBadge"
                      class="bg-blue-100 text-blue-800 text-xs font-bold px-2.5 py-1 rounded-full border border-blue-200"></span>
            </div>

            <p class="text-xs text-gray-500 mb-4 flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M7 11V7a5 5 0 0110 0v4m-5 4h.01M12 21a9 9 0 100-18 9 9 0 000 18z"></path>
                </svg>
                Drag and drop items to reorder.
            </p>

            <ul id="routeList" class="space-y-2 mb-4"></ul>

            <div id="aiBox" class="mt-4 mb-6 p-4 bg-indigo-50 border border-indigo-100 rounded-xl hidden">
                <h3 class="text-sm font-bold text-indigo-900 mb-2 flex items-center gap-2">
                    <svg class="w-4 h-4 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                    AI Route Strategy
                </h3>
                <div id="aiText" class="text-xs text-indigo-800 leading-relaxed whitespace-pre-wrap font-medium"></div>
            </div>

            <a id="mapsLink" href="#" target="_blank"
               class="flex justify-center items-center gap-2 w-full bg-slate-800 text-white font-semibold py-3.5 rounded-xl hover:bg-slate-700 transition shadow-md">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.243-4.243a8 8 0 1111.314 0z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
                Open in Google Maps
            </a>
        </div>
    </div>

    <!-- SortableJS for Mobile & Desktop Drag -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <script>
        async function processRoute() {
            const locationsInput = document.getElementById('locations').value;
            const timesInput = document.getElementById('times').value;

            const locationsList = locationsInput.split('\n').map(loc => loc.trim()).filter(loc => loc !== '');
            const timesList = timesInput.split(/[ ,]+/).filter(t => t !== '');

            const btnText = document.getElementById('btnText');
            const loadingIcon = document.getElementById('loadingIcon');
            const calcBtn = document.getElementById('calcBtn');
            const resultsArea = document.getElementById('resultsArea');
            const aiBox = document.getElementById('aiBox');

            if (locationsList.length < 2) {
                alert("Please enter at least 2 locations.");
                return;
            }

            btnText.innerText = "Analyzing Route & AI...";
            loadingIcon.classList.remove('hidden');
            calcBtn.disabled = true;
            calcBtn.classList.add('opacity-75', 'cursor-not-allowed');
            resultsArea.classList.add('hidden');
            aiBox.classList.add('hidden');

            try {
                const response = await fetch('https://delivery-route-api-26zc.onrender.com/optimize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        locations: locationsList,
                        forced_indices: [],
                        times: timesList
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    renderResults(data.suggested_route, data.estimated_duration_mins, data.suggested_start_time, data.ai_insights);
                } else {
                    alert("API Error: " + data.detail);
                }
            } catch (error) {
                alert("Connection failed. Is the Python backend running?");
            } finally {
                btnText.innerText = "Optimize Route";
                loadingIcon.classList.add('hidden');
                calcBtn.disabled = false;
                calcBtn.classList.remove('opacity-75', 'cursor-not-allowed');
            }
        }

        function renderResults(routeArray, duration, startTime, aiInsights) {
            const resultsArea = document.getElementById('resultsArea');
            const routeList = document.getElementById('routeList');
            const aiBox = document.getElementById('aiBox');
            const aiText = document.getElementById('aiText');

            document.getElementById('durationBadge').innerText = `${duration} mins (Start: ${startTime})`;
            routeList.innerHTML = '';

            routeArray.forEach(addr => {
                const li = document.createElement('li');
                li.className = "bg-white border border-gray-200 rounded-lg p-3 flex items-center gap-3 shadow-sm hover:shadow transition";
                li.innerHTML = `
                    <div class="cursor-grab text-gray-400 hover:text-gray-600">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M7 2a2 2 0 10-4 0 2 2 0 004 0zm7 0a2 2 0 10-4 0 2 2 0 004 0zm-7 8a2 2 0 10-4 0 2 2 0 004 0zm7 0a2 2 0 10-4 0 2 2 0 004 0zm-7 8a2 2 0 10-4 0 2 2 0 004 0zm7 0a2 2 0 10-4 0 2 2 0 004 0z"></path>
                        </svg>
                    </div>
                    <span class="address-text text-sm font-medium text-slate-700 flex-1">${addr}</span>
                `;
                routeList.appendChild(li);
            });

            if (aiInsights && aiInsights.trim() !== "") {
                aiText.innerText = aiInsights;
                aiBox.classList.remove('hidden');
            }

            resultsArea.classList.remove('hidden');
            updateGoogleMapsLink();
        }

        // --- SortableJS Drag & Drop ---
        const routeListContainer = document.getElementById("routeList");
        new Sortable(routeListContainer, {
            animation: 150,
            ghostClass: "dragging",
            onEnd: function () {
                updateGoogleMapsLink();
            }
        });

        // --- Maps URL Generator ---
        function updateGoogleMapsLink() {
            const items = document.querySelectorAll('#routeList .address-text');
            const addresses = Array.from(items).map(item => item.innerText);
            if (addresses.length < 2) return;
            const origin = encodeURIComponent(addresses[0]);
            const destination = encodeURIComponent(addresses[addresses.length - 1]);
            let url = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}&travelmode=driving`;
            if (addresses.length > 2) {
                const waypoints = encodeURIComponent(addresses.slice(1, -1).join('|'));
                url += `&waypoints=${waypoints}`;
            }
            document.getElementById('mapsLink').href = url;
        }
    </script>
</body>
</html>
