
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Route Optimizer Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBK-WMZn-5evKvOtH93VvlHkTfhGZZeDo0&libraries=places"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .drag-handle { cursor: grab; }
        #selectedLocations li { touch-action: pan-y; user-select: none; }
        
        /* Tahmin kutusunun tasarımını iyileştir ve en üste getir */
        .pac-container {
            z-index: 10000 !important;
            border-radius: 12px;
            margin-top: 5px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: none;
            font-family: 'Inter', sans-serif;
        }
        .pac-item { padding: 10px; cursor: pointer; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
        <div class="bg-slate-900 px-6 py-6 text-center">
            <h1 class="text-2xl font-bold text-white tracking-tight">Route Optimizer</h1>
            <p class="text-blue-400 text-xs font-medium mt-1 uppercase tracking-widest">Powered by Place ID & AI</p>
        </div>

        <div class="p-6">
            <div class="mb-4">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Add Location</label>
                <div class="flex gap-2">
                    <input id="autocomplete" type="text" 
                           class="flex-1 border border-gray-300 rounded-xl p-3.5 focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50 text-sm" 
                           placeholder="Search restaurant or address...">
                </div>
            </div>

            <ul id="selectedLocations" class="mb-4 space-y-2"></ul>

            <button type="button" onclick="loadMiniatureHarvest()"
                    class="w-full mb-6 bg-emerald-50 text-emerald-700 border border-emerald-200 font-bold py-3 rounded-xl hover:bg-emerald-100 transition flex justify-center items-center gap-2 text-xs uppercase tracking-widest">
                🌱 Miniature Harvest
            </button>

            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Departure Times (Optional)</label>
                <input type="text" id="times" class="w-full border border-gray-300 rounded-xl p-3.5 outline-none bg-gray-50 text-sm" placeholder="e.g., 08:00 14:00">
            </div>

            <button id="calcBtn" onclick="processRoute()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl hover:bg-blue-700 transition shadow-lg flex justify-center items-center gap-2">
                <span id="btnText">Optimize Strategy</span>
                <svg id="loadingIcon" class="hidden animate-spin h-5 w-5 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            </button>
        </div>

        <div id="resultsArea" class="hidden bg-gray-50 p-6 border-t border-gray-200">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-slate-800">Optimal Route</h2>
                <span id="durationBadge" class="bg-blue-600 text-white text-xs font-bold px-3 py-1 rounded-full"></span>
            </div>
            <ul id="finalRouteList" class="space-y-2 mb-6"></ul>
            <div id="aiBox" class="p-4 bg-white border border-blue-100 rounded-2xl shadow-sm mb-6 hidden">
                <p id="aiText" class="text-xs text-slate-600 leading-relaxed"></p>
            </div>
            <a id="mapsLink" href="#" target="_blank" class="w-full bg-slate-800 text-white font-bold py-4 rounded-2xl flex justify-center items-center gap-2">GO TO MAPS</a>
        </div>
    </div>

    <script>
        let selectedLocations = [];
        let autocomplete;

        function initAutocomplete() {
            autocomplete = new google.maps.places.Autocomplete(
                document.getElementById('autocomplete'),
                { 
                    types: ['establishment', 'geocode'], 
                    componentRestrictions: { country: 'us' },
                    fields: ['address_components', 'geometry', 'icon', 'name', 'place_id', 'formatted_address']
                }
            );

            autocomplete.addListener('place_changed', () => {
                const place = autocomplete.getPlace();
                if (!place.place_id) return;
                
                selectedLocations.push({
                    address: place.formatted_address,
                    place_id: place.place_id,
                    name: place.name
                });
                renderSelectedList();
                document.getElementById('autocomplete').value = '';
            });
        }

        function renderSelectedList() {
            const list = document.getElementById('selectedLocations');
            list.innerHTML = selectedLocations.map((loc, i) => `
                <li class="bg-white border border-gray-200 p-3 rounded-xl flex justify-between items-center shadow-sm animate-in fade-in slide-in-from-top-1">
                    <span class="text-sm font-medium text-gray-700 truncate mr-2">${loc.name || loc.address}</span>
                    <button onclick="removeLocation(${i})" class="text-red-400 hover:text-red-600 p-1">✕</button>
                </li>
            `).join('');
        }

        function removeLocation(index) {
            selectedLocations.splice(index, 1);
            renderSelectedList();
        }

        function loadMiniatureHarvest() {
            alert("Miniature Harvest adreslerini kesin doğruluk için arama kutusuna yazarak listeden seçin.");
        }

        async function processRoute() {
            if (selectedLocations.length < 2) return alert("Lütfen en az 2 durak ekleyin.");
            
            const btnText = document.getElementById('btnText');
            const loadingIcon = document.getElementById('loadingIcon');
            const resultsArea = document.getElementById('resultsArea');

            btnText.innerText = "Hesaplanıyor...";
            loadingIcon.classList.remove('hidden');

            try {
                const response = await fetch('/optimize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        locations: selectedLocations.map(l => ({ address: l.address, place_id: l.place_id })),
                        times: document.getElementById('times').value.split(/[ ,]+/).filter(t => t)
                    })
                });

                const data = await response.json();
                if (response.ok) {
                    renderFinalResults(data);
                } else {
                    alert("Hata: " + data.detail);
                }
            } catch (e) {
                alert("Sunucu bağlantı hatası.");
            } finally {
                btnText.innerText = "Optimize Strategy";
                loadingIcon.classList.add('hidden');
            }
        }

        function renderFinalResults(data) {
            document.getElementById('resultsArea').classList.remove('hidden');
            document.getElementById('durationBadge').innerText = `${data.estimated_duration_mins} dk`;
            
            const list = document.getElementById('finalRouteList');
            list.innerHTML = data.suggested_route.map(addr => `
                <li class="bg-white p-3 rounded-xl border-l-4 border-blue-500 shadow-sm text-sm text-slate-700">${addr}</li>
            `).join('');

            if (data.ai_insights) {
                document.getElementById('aiBox').classList.remove('hidden');
                document.getElementById('aiText').innerText = data.ai_insights;
            }

            const origin = encodeURIComponent(data.suggested_route[0]);
            const dest = encodeURIComponent(data.suggested_route[data.suggested_route.length - 1]);
            const waypoints = encodeURIComponent(data.suggested_route.slice(1, -1).join('|'));
            document.getElementById('mapsLink').href = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${dest}&waypoints=${waypoints}&travelmode=driving`;
        }

        window.onload = initAutocomplete;
    </script>
</body>
</html>
